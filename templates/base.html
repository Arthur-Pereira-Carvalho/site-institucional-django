<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSync</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0b132b, #1c2541);
            color: white;
        }

        .navbar {
            background-color: #0b132b !important;
        }

        .navbar-brand {
            font-weight: bold;
            color: #00d4ff !important;
        }

        .btn-primary {
            background-color: #0d6efd;
            border: none;
        }

        .btn-primary:hover {
            background-color: #0b5ed7;
        }

        footer {
            background-color: #0b132b;
        }

        .hero {
            padding: 80px 20px;
            background: linear-gradient(135deg, #0b132b, #1c2541);
            color: white;
            border-radius: 10px;
        }
        input, textarea {
            width: 100%;
            box-sizing: border-box;
        }
        .card {
            background-color: #ffffff;
            color: #000;
            border-radius: 10px;
        }
        h1, h2, h3 {
            font-weight: bold;
        }

        p {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">DevSync</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/sobre/">Sobre</a></li>
        <li class="nav-item"><a class="nav-link" href="/servicos/">Serviços</a></li>
        <li class="nav-item"><a class="nav-link" href="/contato/">Contato</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-5 p-4" style="background-color: rgba(255,255,255,0.05); border-radius: 10px;">
    {% block content %}{% endblock %}
</div>

<footer class="text-white text-center p-4 mt-5">
    <p class="mb-0">© 2026 DevSync - Soluções em Software</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
