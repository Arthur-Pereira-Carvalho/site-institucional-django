{% extends 'base.html' %}

{% block content %}
<h1>Contato</h1>

{% if sucesso %}
    <div class="alert alert-success">
        Mensagem enviada com sucesso!
    </div>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Enviar</button>
</form>

{% endblock %}
